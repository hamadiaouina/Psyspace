name: "Sécurité - CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1' # Lancement automatique tous les lundis à minuit

jobs:
  analyze:
    name: Analyse de sécurité
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'php' ]

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Initialisation de CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Utilise le modèle d'analyse étendu pour trouver encore plus de failles
        queries: security-extended,security-and-quality

    - name: Lancement de l'analyse CodeQL
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"