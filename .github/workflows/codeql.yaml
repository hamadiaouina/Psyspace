name: "Sécurité - CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  analyze:
    name: Analyse de sécurité
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # On remplace 'php' par 'javascript-typescript' et 'python' qui sont supportés
        language: [ 'javascript-typescript', 'python' ]

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    # On passe en v4 selon la recommandation de GitHub
    - name: Initialisation de CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Lancement de l'analyse CodeQL
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"