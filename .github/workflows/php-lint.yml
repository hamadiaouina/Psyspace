      - name: Fail if .env is present or tracked (allow .env.example)
        shell: bash
        run: |
          set -euo pipefail

          # 1) Block a real .env file in the workspace
          if [ -f ".env" ]; then
            echo "::error::.env exists in the workspace. Keep it local/server-only and never commit it."
            exit 1
          fi

          # 2) Block tracked .env (but allow .env.example)
          if git ls-files --error-unmatch ".env" >/dev/null 2>&1; then
            echo "::error::.env is tracked by git. Untrack it: git rm --cached .env"
            exit 1
          fi

          # 3) Optional: block other tracked env variants like ".env.production" (but allow .env.example)
          tracked_env_variants="$(
            git ls-files \
              | grep -E '(^|/)\.env\.[^/]+$' \
              | grep -v -E '(^|/)\.env\.example$'
          )"

          if [ -n "$tracked_env_variants" ]; then
            echo "::error::Tracked env variant files detected (not allowed):"
            echo "$tracked_env_variants"
            exit 1
          fi

          echo "OK: .env.example is allowed; real env files are blocked."