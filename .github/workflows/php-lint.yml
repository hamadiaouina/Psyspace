name: PHP Lint + Secrets Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint PHP + check secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Fail if .env is present or tracked (allow .env.example)
        shell: bash
        run: |
          set -euo pipefail

          # Block a real .env file in the workspace
          if [ -f ".env" ]; then
            echo "::error::.env exists in the workspace. Keep it local/server-only and never commit it."
            exit 1
          fi

          # Block tracked .env (but allow .env.example)
          if git ls-files --error-unmatch ".env" >/dev/null 2>&1; then
            echo "::error::.env is tracked by git. Untrack it: git rm --cached .env"
            exit 1
          fi

          # Optional: block other tracked env variants like ".env.production"
          tracked_envs="$(git ls-files | grep -E '(^|/)\.env\.[^/]+$' || true)"
          if [ -n "$tracked_envs" ]; then
            echo "::error::Tracked env variant files detected (not allowed):"
            echo "$tracked_envs"
            exit 1
          fi

          echo "OK: no tracked .env and no tracked .env.* variants; .env.example is allowed."