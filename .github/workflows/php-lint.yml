name: PHP Lint + Secrets Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint PHP + check secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Fail if .env is tracked or present
        shell: bash
        run: |
          set -euo pipefail

          # If .env exists at root (even untracked), fail
          if [ -f ".env" ]; then
            echo "::error::.env exists in repository workspace. Remove it and keep it only on the server/local machine."
            exit 1
          fi

          # If any env file is tracked by git, fail
          if git ls-files | grep -qE '(^|/)\.env($|[./])|(^|/)[^/]+\.env$'; then
            echo "::error::An env file appears to be tracked by git. Remove it from git (and history if needed)."
            git ls-files | grep -E '(^|/)\.env($|[./])|(^|/)[^/]+\.env$' || true
            exit 1
          fi

          echo "OK: no env files tracked and no root .env file present."

      - name: PHP syntax check (php -l) for all PHP files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          files=(**/*.php)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No PHP files found."
            exit 0
          fi

          failed=0
          for f in "${files[@]}"; do
            echo "Linting: $f"
            php -l "$f" || failed=1
          done

          if [ "$failed" -ne 0 ]; then
            echo "::error::PHP lint failed."
            exit 1
          fi