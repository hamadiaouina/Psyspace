name: PHP Lint + Secrets Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Fail if .env is present or tracked (debug)
        shell: bash
        run: |
          set -euo pipefail

          echo "== Debug: listing env-like files in workspace =="
          ls -la . | grep -E '(^| )\.env' || true

          echo "== Debug: git tracked env-like files =="
          git ls-files | grep -E '(^|/)\.env($|[./])|(^|/)\.env\.[^/]+$|(^|/)[^/]+\.env$' || true

          # Hard fail rules
          if [ -f ".env" ]; then
            echo "::error::.env exists in the workspace. Remove it (keep only local/server)."
            exit 1
          fi

          if git ls-files --error-unmatch ".env" >/dev/null 2>&1; then
            echo "::error::.env is tracked by git. Run: git rm --cached .env"
            exit 1
          fi

          tracked_env_variants="$(
            git ls-files \
              | grep -E '(^|/)\.env\.[^/]+$' \
              | grep -v -E '(^|/)\.env\.example$' \
              || true
          )"

          if [ -n "${tracked_env_variants:-}" ]; then
            echo "::error::Tracked env variant files detected (not allowed):"
            echo "$tracked_env_variants"
            exit 1
          fi

          echo "OK: env checks passed."

      - name: PHP syntax check (php -l)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(**/*.php)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No PHP files found."
            exit 0
          fi

          failed=0
          for f in "${files[@]}"; do
            echo "Linting: $f"
            php -l "$f" || failed=1
          done

          if [ "$failed" -ne 0 ]; then
            echo "::error::PHP lint failed."
            exit 1
          fi