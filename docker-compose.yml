version:'3.8'
services:
  web:
    image: php:8.2-apache
    ports:
      -"8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

   db:
     image: mysql:8.0
     restart: always
     environment:
        MYSQL_ALLOW_EMPTY_PASSWORD:"yes"
        MYSQL_DATABASE: edoc
     ports:
        - "3306:3306"

